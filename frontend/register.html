<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at center, #deb887 0%, #c89b6d 40%, #8b5a2b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .register-box {
            background: white;
            padding: 25px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #8b5a2b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #6d4521;
        }

        .login-link {
            text-align: center;
            margin-top: 10px;
        }

        .login-link a {
            text-decoration: none;
            color: #8b5a2b;
            font-weight: bold;
        }

        .guest-btn {
            background: #ddd;
            color: black;
        }

        .guest-btn:hover {
            background: #ccc;
        }
    </style>

</head>

<body>

<div class="register-box">

<h2>Register</h2>

<form action="index.html">
    
    <input type="email" placeholder="Email" required>

    <input type="password" placeholder="Password" required>

    <input type="password" placeholder="Confirm Password" required>

    <button type="submit">Register</button>

</form>

<div class="login-link">
    Already have an account? 
    <a href="login.html">Login</a>
</div>

<form action="index.html">
    <button class="guest-btn">Continue without account</button>
</form>

</div>

</body>
</html>
