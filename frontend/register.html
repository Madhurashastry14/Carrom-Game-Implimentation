<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background: #3a8de0;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            text-decoration: none;
            color: #4facfe;
            font-weight: bold;
        }

        .guest-btn {
            background: #eee;
            color: black;
            margin-top: 10px;
        }

        .guest-btn:hover {
            background: #ddd;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Register</h2>

<form action="index.html">
    
    <label>Username</label>
    <input type="text" required>

    <label>Email</label>
    <input type="email" required>

    <label>Password</label>
    <input type="password" required>

    <label>Confirm Password</label>
    <input type="password" required>

    <button type="submit" class="btn">Register</button>

</form>

<div class="link">
    Already have an account? 
    <a href="login.html">Login</a>
</div>

<form action="index.html">
    <button class="btn guest-btn">Continue without account</button>
</form>

</div>

</body>
</html>
