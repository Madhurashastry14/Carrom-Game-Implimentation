<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carrom Login & Signup</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #1d4350, #a43931);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 30px;
    width: 320px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #a43931;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #1d4350;
}

.toggle {
    margin-top: 10px;
    font-size: 14px;
}
.toggle label {
    color: #a43931;
    cursor: pointer;
}

#toggle-form {
    display: none;
}

.signup {
    display: none;
}

#toggle-form:checked ~ .container .login {
    display: none;
}

#toggle-form:checked ~ .container .signup {
    display: block;
}

.rules {
    font-size: 12px;
    color: gray;
    text-align: left;
}
</style>

</head>
<body>

<!-- Hidden checkbox for toggle -->
<input type="checkbox" id="toggle-form">

<div class="container">

    <!-- LOGIN -->
    <div class="login">
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Email" required>

            <input type="password" placeholder="Password"
                pattern="^(?=.[a-z])(?=.[A-Z])(?=.\d)(?=.[@$!%*?&]).{8,}$"
                title="Must contain at least 8 characters, one uppercase, one lowercase, one number and one special character"
                required>

            <button>Login</button>
        </form>

        <div class="toggle">
            Don't have an account? 
            <label for="toggle-form">Sign Up</label>
        </div>
    </div>

    <!-- SIGNUP -->
    <div class="signup">
        <h2>Sign Up</h2>
        <form>
            <input type="text" placeholder="Username" required>

            <input type="email" placeholder="Email" required>

            <input type="password" placeholder="Password"
                pattern="^(?=.[a-z])(?=.[A-Z])(?=.\d)(?=.[@$!%*?&]).{8,}$"
                title="Must contain at least 8 characters, one uppercase, one lowercase, one number and one special character"
                required>

            <button>Register</button>
        </form>
<div class="toggle">
            Already have an account? 
            <label for="toggle-form">Login</label>
        </div>
    </div>

</div>

</body>
</html>
